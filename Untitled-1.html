<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Пиксельный герой — убей огров!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f0f1a; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: monospace; color: #eee; }
  h1 { font-size: 20px; margin-bottom: 8px; color: #f5c518; letter-spacing: 2px; }
  #ui { display: flex; gap: 16px; align-items: center; padding: 8px 16px; background: rgba(255,255,255,0.05); border-radius: 6px; margin-bottom: 6px; font-size: 14px; flex-wrap: wrap; justify-content: center; }
  #goldDisplay { color: #f5c518; font-weight: 700; }
  #hpBar { width: 130px; height: 14px; background: #333; border-radius: 3px; overflow: hidden; }
  #hpFill { height: 100%; background: #e74c3c; transition: width 0.1s; }
  #weaponBar { display: flex; gap: 8px; margin-bottom: 6px; }
  .wbtn {
    padding: 6px 14px; border: 2px solid #555; border-radius: 5px;
    background: #1e1e30; color: #ccc; cursor: pointer; font-family: monospace; font-size: 13px;
    transition: all 0.15s;
  }
  .wbtn:hover { border-color: #f5c518; color: #f5c518; }
  .wbtn.active { border-color: #f5c518; background: #2a2a10; color: #f5c518; font-weight: bold; }
  #gameCanvas { display: block; image-rendering: pixelated; border: 2px solid #444; border-radius: 4px; }
  #wrap { position: relative; display: inline-block; }
  #gameOver { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,0,0,0.92); color: #fff; padding: 28px 40px; border-radius: 10px; text-align: center; }
  #gameOver h2 { font-size: 22px; margin-bottom: 8px; }
  #gameOver button { margin-top: 14px; padding: 10px 24px; background: #e74c3c; border: none; color: #fff; border-radius: 6px; cursor: pointer; font-size: 15px; font-family: monospace; }
  #gameOver button:hover { background: #c0392b; }
  #controls { font-size: 12px; color: #888; margin-top: 6px; text-align: center; }
</style>
</head>
<body>

<h1>⚔️ PIXEL HERO</h1>

<div id="ui">
  <span> <span id="hpNum">100</span>/100</span>
  <div id="hpBar"><div id="hpFill" style="width:100%"></div></div>
  <span id="goldDisplay"> 0 золота</span>
  <span id="waveDisplay" style="font-size:12px; color:#aaa">Волна 1</span>
  <span id="weaponLabel" style="font-size:12px; color:#7ec8e3">🗡️ Меч</span>
</div>

<div id="weaponBar">
  <button class="wbtn active" id="btn-sword" onclick="selectWeapon('sword')">🗡️ Меч</button>
  <button class="wbtn" id="btn-gun" onclick="selectWeapon('gun')">🔫 Пистолет</button>
  <button class="wbtn" id="btn-axe" onclick="selectWeapon('axe')">🪓 Топор</button>
</div>

<div id="wrap">
  <canvas id="gameCanvas" width="640" height="320"></canvas>
  <div id="gameOver">
    <h2> Герой пал</h2>
    <div id="finalGold" style="color:#f5c518; font-size:16px;"></div>
    <button onclick="startGame()">Начать заново</button>
  </div>
</div>

<div id="controls">
  WASD / стрелки — движение &nbsp;|&nbsp; ПРОБЕЛ — атака &nbsp;|&nbsp; 1-Меч &nbsp; 2-Пистолет &nbsp; 3-Топор
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ── ОРУЖИЯ ──────────────────────────────────────────────────────────────────
const WEAPONS = {
  sword: {
    name: ' Меч',
    dmg: 25,
    cd: 18,       // кулдаун (кадры)
    duration: 10, // длительность атаки
    range: 38,    // ближний конус вперёд
    aoe: false,
    bullet: false,
    color: '#bdc3c7'
  },
  gun: {
    name: ' Пистолет',
    dmg: 18,
    cd: 30,
    duration: 4,
    range: 260,   // дальность пули
    aoe: false,
    bullet: true,
    color: '#3498db'
  },
  axe: {
    name: ' Топор',
    dmg: 12,
    cd: 60,       // долгий кулдаун
    duration: 35, // долго бьёт
    range: 55,    // круговой радиус
    aoe: true,
    color: '#e67e22'
  }
};

let hero, ogres, bullets, particles, gold, hp, maxHp, wave, spawnTimer, gameRunning, keys;
let currentWeapon = 'sword';

function selectWeapon(w) {
  currentWeapon = w;
  document.querySelectorAll('.wbtn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + w).classList.add('active');
  document.getElementById('weaponLabel').textContent = WEAPONS[w].name;
  if (hero) hero.atkCd = 0; // сброс при смене
}

function startGame() {
  document.getElementById('gameOver').style.display = 'none';
  keys = {};
  gold = 0;
  hp = 100; maxHp = 100;
  wave = 1;
  spawnTimer = 0;
  ogres = [];
  bullets = [];
  particles = [];
  hero = {
    x: W/2-8, y: H/2-16, w: 16, h: 24,
    vx: 0, vy: 0, spd: 2.2,
    facing: 1,
    atk: false, atkTimer: 0, atkCd: 0,
    frame: 0, frameTimer: 0,
    dmgFlash: 0
  };
  gameRunning = true;
  spawnWave();
  updateUI();
  loop();
}

function spawnWave() {
  let count = 2 + wave * 2;
  for (let i = 0; i < count; i++) {
    let side = Math.floor(Math.random() * 4);
    let x, y;
    if (side === 0)      { x = Math.random() * W; y = -24; }
    else if (side === 1) { x = W + 24; y = Math.random() * H; }
    else if (side === 2) { x = Math.random() * W; y = H + 24; }
    else                 { x = -24; y = Math.random() * H; }
    ogres.push({
      x, y, w: 20, h: 28,
      hp: 30 + wave * 10, maxHp: 30 + wave * 10,
      spd: 0.8 + wave * 0.1,
      frame: 0, frameTimer: 0,
      atkTimer: 0, dmgFlash: 0,
      dead: false, deadTimer: 0
    });
  }
}

function rectOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function dist(ax, ay, bx, by) { return Math.hypot(ax - bx, ay - by); }

function spawnParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    let angle = Math.random() * Math.PI * 2;
    let spd = 1 + Math.random() * 2.5;
    particles.push({ x, y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd, life: 18 + Math.random()*20, color, isText: false });
  }
}

function spawnGoldText(x, y) {
  let g = 10 + Math.floor(Math.random() * 10);
  particles.push({ x, y, vx: (Math.random()-0.5)*1.5, vy: -2.2 - Math.random()*1.5, life: 44, color: '#f5c518', text: '+'+g, isText: true });
}

// ── ГЕРОЙ АТАКУЕТ ────────────────────────────────────────────────────────────
function heroAttack() {
  const W_ = WEAPONS[currentWeapon];
  const hcx = hero.x + hero.w/2, hcy = hero.y + hero.h/2;

  if (W_.bullet) {
    // Пистолет — спавним пулю в направлении взгляда
    bullets.push({
      x: hcx, y: hcy,
      vx: hero.facing * 5,
      vy: 0,
      dmg: W_.dmg,
      range: W_.range,
      traveled: 0,
      r: 4,
      color: W_.color,
      hit: false
    });
  } else if (W_.aoe) {
    // Топор — круговой удар, бьёт всех в радиусе
    for (let o of ogres) {
      if (o.dead) continue;
      let ocx = o.x + o.w/2, ocy = o.y + o.h/2;
      if (dist(hcx, hcy, ocx, ocy) <= W_.range) {
        o.hp -= W_.dmg;
        o.dmgFlash = 10;
        spawnParticles(ocx, ocy, '#e67e22', 5);
      }
    }
    spawnParticles(hcx, hcy, '#e67e22', 10);
  } else {
    // Меч — конус вперёд
    for (let o of ogres) {
      if (o.dead) continue;
      let ocx = o.x + o.w/2, ocy = o.y + o.h/2;
      let d = dist(hcx, hcy, ocx, ocy);
      if (d <= W_.range) {
        // только в сторону взгляда
        let inFront = hero.facing === 1 ? ocx >= hcx - 10 : ocx <= hcx + 10;
        if (inFront) {
          o.hp -= W_.dmg + Math.floor(Math.random()*8);
          o.dmgFlash = 8;
          spawnParticles(ocx, ocy, '#e74c3c', 4);
        }
      }
    }
  }
}

function update() {
  if (!gameRunning) return;

  const W_ = WEAPONS[currentWeapon];

  // Движение
  let dx = 0, dy = 0;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) dx -= 1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;
  if (keys['ArrowUp']    || keys['w'] || keys['W']) dy -= 1;
  if (keys['ArrowDown']  || keys['s'] || keys['S']) dy += 1;
  if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
  hero.vx = dx * hero.spd; hero.vy = dy * hero.spd;
  if (dx !== 0) hero.facing = dx > 0 ? 1 : -1;
  hero.x = Math.max(0, Math.min(W - hero.w, hero.x + hero.vx));
  hero.y = Math.max(0, Math.min(H - hero.h, hero.y + hero.vy));

  // Анимация
  hero.frameTimer++;
  if (hero.frameTimer > 8) { hero.frame = (hero.frame+1)%4; hero.frameTimer = 0; }
  if (hero.atkCd > 0) hero.atkCd--;
  if (hero.atkTimer > 0) hero.atkTimer--;
  else hero.atk = false;
  if (hero.dmgFlash > 0) hero.dmgFlash--;

  // Атака по пробелу
  if ((keys[' '] || keys['z'] || keys['Z']) && hero.atkCd === 0) {
    hero.atk = true;
    hero.atkTimer = W_.duration;
    hero.atkCd = W_.cd;
    heroAttack();
  }

  // Пули
  for (let b of bullets) {
    b.x += b.vx; b.y += b.vy;
    b.traveled += Math.abs(b.vx) + Math.abs(b.vy);
    if (b.traveled >= b.range || b.x < 0 || b.x > W || b.y < 0 || b.y > H) { b.hit = true; continue; }
    for (let o of ogres) {
      if (o.dead) continue;
      if (!b.hit && b.x > o.x && b.x < o.x+o.w && b.y > o.y && b.y < o.y+o.h) {
        o.hp -= b.dmg; o.dmgFlash = 8;
        spawnParticles(b.x, b.y, '#3498db', 5);
        b.hit = true;
      }
    }
  }
  bullets = bullets.filter(b => !b.hit);

  // Огры
  let aliveOgres = [];
  for (let o of ogres) {
    if (o.dead) { o.deadTimer++; if (o.deadTimer < 20) aliveOgres.push(o); continue; }

    let ox = hero.x + hero.w/2 - (o.x + o.w/2);
    let oy = hero.y + hero.h/2 - (o.y + o.h/2);
    let d = Math.hypot(ox, oy);
    if (d > 1) { o.x += ox/d * o.spd; o.y += oy/d * o.spd; }

    o.frameTimer++; if (o.frameTimer > 10) { o.frame=(o.frame+1)%4; o.frameTimer=0; }
    if (o.dmgFlash > 0) o.dmgFlash--;

    // Огр бьёт героя: при контакте -1 HP каждые ~40 кадров
    if (rectOverlap(hero, o)) {
      o.atkTimer++;
      if (o.atkTimer >= 40) {
        hp = Math.max(0, hp - 1);      // ← урон 1 HP
        hero.dmgFlash = 8;
        spawnParticles(hero.x+hero.w/2, hero.y+hero.h/2, '#ff4444', 3);
        o.atkTimer = 0;
        updateUI();
      }
    } else {
      if (o.atkTimer > 0) o.atkTimer--;
    }

    if (o.hp <= 0) {
      let g = 10 + Math.floor(Math.random()*10);
      gold += g;
      spawnParticles(o.x+o.w/2, o.y+o.h/2, '#27ae60', 8);
      spawnGoldText(o.x+o.w/2, o.y+o.h/2-10);
      o.dead = true; o.deadTimer = 0;
      updateUI();
    } else { aliveOgres.push(o); }
  }
  ogres = aliveOgres;

  // Частицы
  for (let p of particles) { p.x += p.vx; p.y += p.vy; p.life--; if (!p.isText) p.vy += 0.1; }
  particles = particles.filter(p => p.life > 0);

  // Следующая волна
  spawnTimer++;
  if (ogres.filter(o=>!o.dead).length === 0 && spawnTimer > 60) {
    wave++; spawnTimer = 0; spawnWave();
    document.getElementById('waveDisplay').textContent = 'Волна ' + wave;
  }

  // Смерть героя
  if (hp <= 0) {
    gameRunning = false;
    document.getElementById('gameOver').style.display = 'block';
    document.getElementById('finalGold').textContent = 'Собрано золота: ' + gold;
  }
}

function updateUI() {
  document.getElementById('hpNum').textContent = Math.max(0, hp);
  document.getElementById('hpFill').style.width = (hp/maxHp*100) + '%';
  document.getElementById('goldDisplay').textContent = '🪙 ' + gold + ' золота';
}

// ── РИСОВАНИЕ ────────────────────────────────────────────────────────────────
function drawPixelChar(cx, cy, frame, facing, flash, type, weapon) {
  ctx.save();
  if (facing === -1) { ctx.translate(cx,cy); ctx.scale(-1,1); ctx.translate(-cx,-cy); }

  if (type === 'hero') {
    let bc = flash > 0 ? '#fff' : '#3498db';
    // тело
    ctx.fillStyle = bc; ctx.fillRect(cx-6, cy-8, 12, 14);
    // голова
    ctx.fillStyle = flash>0?'#fff':'#f5cba7'; ctx.fillRect(cx-5, cy-18, 10, 10);
    // глаза
    ctx.fillStyle = '#2c3e50'; ctx.fillRect(cx-3,cy-15,2,2); ctx.fillRect(cx+1,cy-15,2,2);
    // волосы
    ctx.fillStyle = '#e67e22'; ctx.fillRect(cx-5, cy-22, 10, 5);
    // ноги
    let lo = [0,1,0,-1][frame];
    ctx.fillStyle = flash>0?'#fff':'#2c3e50';
    ctx.fillRect(cx-6, cy+6, 5, 8+lo); ctx.fillRect(cx+1, cy+6, 5, 8-lo);

    // оружие в руке
    if (weapon === 'sword') {
      ctx.fillStyle = '#e8e8e8'; ctx.fillRect(cx+5,cy-14,3,14);
      ctx.fillStyle = '#888'; ctx.fillRect(cx+3,cy-4,7,2);
      ctx.fillStyle = '#c0a060'; ctx.fillRect(cx+6,cy-15,2,3);
    } else if (weapon === 'gun') {
      ctx.fillStyle = '#555'; ctx.fillRect(cx+4,cy-6,9,5);
      ctx.fillStyle = '#333'; ctx.fillRect(cx+10,cy-5,4,3);
      ctx.fillStyle = '#888'; ctx.fillRect(cx+5,cy-4,3,4);
    } else if (weapon === 'axe') {
      ctx.fillStyle = '#8B5E3C'; ctx.fillRect(cx+5,cy-12,3,16);
      ctx.fillStyle = '#bbb'; ctx.fillRect(cx+4,cy-14,6,7);
      ctx.fillStyle = '#999'; ctx.fillRect(cx+8,cy-13,4,5);
    }

  } else if (type === 'ogre') {
    let lo2 = [0,2,0,-2][frame];
    let bc2 = flash>0?'#fff':'#27ae60';
    ctx.fillStyle = bc2; ctx.fillRect(cx-8,cy-6,16,16);
    ctx.fillStyle = flash>0?'#fff':'#2ecc71'; ctx.fillRect(cx-7,cy-20,14,14);
    ctx.fillStyle = '#e74c3c'; ctx.fillRect(cx-5,cy-16,3,3); ctx.fillRect(cx+2,cy-16,3,3);
    ctx.fillStyle = '#ecf0f1';
    ctx.fillRect(cx-4,cy-9,2,4); ctx.fillRect(cx-1,cy-9,2,4); ctx.fillRect(cx+2,cy-9,2,4);
    ctx.fillStyle = '#8e44ad';
    ctx.fillRect(cx-7,cy-24,4,6); ctx.fillRect(cx+3,cy-24,4,6);
    ctx.fillStyle = bc2;
    ctx.fillRect(cx-14,cy-4,6,10); ctx.fillRect(cx+8,cy-4,6,10);
    ctx.fillStyle = '#795548'; ctx.fillRect(cx+10,cy-10,4,16);
    ctx.fillStyle = '#6d4c41'; ctx.fillRect(cx+8,cy-12,8,6);
    ctx.fillStyle = flash>0?'#fff':'#1a8c4f';
    ctx.fillRect(cx-8,cy+10,6,8+lo2); ctx.fillRect(cx+2,cy+10,6,8-lo2);
  }
  ctx.restore();
}

function drawHPBar(o) {
  let bw = o.w+4, bh = 4, bx = o.x-2, by = o.y-30;
  ctx.fillStyle = '#222'; ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle = '#e74c3c'; ctx.fillRect(bx,by,bw*(o.hp/o.maxHp),bh);
}

function drawWeaponEffect() {
  const W_ = WEAPONS[currentWeapon];
  const hcx = hero.x+hero.w/2, hcy = hero.y+hero.h/2;
  if (!hero.atk) return;
  let alpha = hero.atkTimer / W_.duration;

  if (currentWeapon === 'sword') {
    ctx.save();
    ctx.globalAlpha = alpha * 0.35;
    ctx.fillStyle = '#f5c518';
    ctx.beginPath();
    let ax = hero.facing===1 ? hcx+6 : hcx-6;
    ctx.arc(ax, hcy, W_.range*0.8, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

  } else if (currentWeapon === 'axe') {
    ctx.save();
    ctx.globalAlpha = alpha * 0.25;
    ctx.fillStyle = '#e67e22';
    ctx.beginPath();
    ctx.arc(hcx, hcy, W_.range, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#e67e22';
    ctx.lineWidth = 2;
    ctx.globalAlpha = alpha * 0.6;
    ctx.stroke();
    ctx.restore();
  }
}

function draw() {
  // Фон
  ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0,0,W,H);

  // Сетка
  ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 1;
  for (let x=0;x<W;x+=32){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y=0;y<H;y+=32){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  ctx.fillStyle = 'rgba(255,255,255,0.025)';
  for (let i=0;i<W;i+=64) for(let j=0;j<H;j+=64) ctx.fillRect(i+16,j+16,4,4);

  // Частицы
  for (let p of particles) {
    ctx.globalAlpha = Math.min(1, p.life/30);
    if (p.isText) {
      ctx.fillStyle = p.color; ctx.font = 'bold 11px monospace';
      ctx.textAlign = 'left'; ctx.fillText(p.text, p.x, p.y);
    } else {
      ctx.fillStyle = p.color; ctx.fillRect(p.x-2,p.y-2,4,4);
    }
    ctx.globalAlpha = 1;
  }

  // Огры
  for (let o of ogres) {
    if (o.dead) ctx.globalAlpha = 0.25;
    drawPixelChar(Math.round(o.x+o.w/2), Math.round(o.y+o.h/2)+4, o.frame, 1, o.dmgFlash, 'ogre', null);
    if (!o.dead) drawHPBar(o);
    ctx.globalAlpha = 1;
  }

  // Эффект оружия
  drawWeaponEffect();

  // Герой
  drawPixelChar(Math.round(hero.x+hero.w/2), Math.round(hero.y+hero.h/2)+4, hero.frame, hero.facing, hero.dmgFlash, 'hero', currentWeapon);

  // Пули
  for (let b of bullets) {
    ctx.fillStyle = b.color;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath(); ctx.arc(b.x-b.vx*0.5,b.y,b.r*0.4,0,Math.PI*2); ctx.fill();
  }

  // КД полоска под героем
  if (hero.atkCd > 0) {
    const W_ = WEAPONS[currentWeapon];
    let px = hero.x, py = hero.y + hero.h + 3;
    ctx.fillStyle = '#333'; ctx.fillRect(px,py,hero.w,3);
    ctx.fillStyle = '#f5c518';
    ctx.fillRect(px,py, hero.w*(1-hero.atkCd/W_.cd),3);
  }

  // Баннер волны
  if (spawnTimer < 90) {
    let a = spawnTimer < 45 ? spawnTimer/15 : (90-spawnTimer)/15;
    ctx.save();
    ctx.globalAlpha = Math.min(1,a);
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(W/2-100,H/2-24,200,44);
    ctx.fillStyle = '#f5c518';
    ctx.font = 'bold 17px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('⚔ Волна ' + wave, W/2, H/2+8);
    ctx.restore();
  }
}

// ── LOOP ─────────────────────────────────────────────────────────────────────
let lastTime = 0;
function loop(ts=0) {
  if (!gameRunning) return;
  if (ts - lastTime > 16) { lastTime=ts; update(); draw(); }
  requestAnimationFrame(loop);
}

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') e.preventDefault();
  if (e.key === '1') selectWeapon('sword');
  if (e.key === '2') selectWeapon('gun');
  if (e.key === '3') selectWeapon('axe');
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

startGame();
</script>
</body>
</html>
